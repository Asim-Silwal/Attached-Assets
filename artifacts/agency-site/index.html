<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="description" content="Vertex Digital builds premium, conversion-focused websites for U.S. home service businesses that want stronger trust, better leads, and more booked calls." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Vertex Digital | Websites for U.S. Home Service Businesses" />
    <meta property="og:description" content="Vertex Digital builds premium, conversion-focused websites for U.S. home service businesses that want stronger trust, better leads, and more booked calls." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vertex Digital" />
    <meta property="og:url" content="/" />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:alt" content="Vertex Digital social preview" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vertex Digital | Websites for U.S. Home Service Businesses" />
    <meta name="twitter:description" content="Vertex Digital builds premium, conversion-focused websites for U.S. home service businesses that want stronger trust, better leads, and more booked calls." />
    <meta name="twitter:image" content="/og-image.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="application/ld+json" id="vertex-digital-jsonld">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "@id": "/#vertex-digital",
        "name": "Vertex Digital",
        "url": "/",
        "description": "Vertex Digital helps U.S. home service businesses grow through premium websites, SEO, branding, and ongoing support.",
        "areaServed": {
          "@type": "Country",
          "name": "United States"
        },
        "email": "verted.d10@gmail.com",
        "serviceType": [
          "Website Design",
          "Website Development",
          "UI/UX Design",
          "Branding",
          "SEO",
          "Website Maintenance"
        ],
        "sameAs": [
          "https://www.linkedin.com/company/vertex-digital/"
        ]
      }
    </script>
    <script>
      (function () {
        var pathname = window.location.pathname.replace(/index\.html$/, '');
        if (!pathname.endsWith('/')) {
          pathname += '/';
        }

        var pageUrl = window.location.origin + pathname;
        var canonical = document.querySelector('link[rel="canonical"]');
        if (!canonical) {
          canonical = document.createElement('link');
          canonical.setAttribute('rel', 'canonical');
          document.head.appendChild(canonical);
        }
        if (canonical) {
          canonical.setAttribute('href', pageUrl);
        }

        var ogUrl = document.querySelector('meta[property="og:url"]');
        if (ogUrl) {
          ogUrl.setAttribute('content', pageUrl);
        }

        var jsonLd = document.getElementById('vertex-digital-jsonld');
        if (jsonLd) {
          try {
            var data = JSON.parse(jsonLd.textContent || '{}');
            data.url = pageUrl;
            data['@id'] = pageUrl + '#vertex-digital';
            jsonLd.textContent = JSON.stringify(data);
          } catch (error) {
            console.warn('Unable to update structured data', error);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
