kind = "web"
previewPath = "/"
title = "Agency Website"
version = "1.0.0"
id = "artifacts/agency-site"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19242

[services.development]
run = "pnpm --filter @workspace/agency-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agency-site", "run", "build" ]
serve = "static"
publicDir = "artifacts/agency-site/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19242"
BASE_PATH = "/"
